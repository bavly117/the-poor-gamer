<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚫 تحذير! | The Poor Gamer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Gaming Theme - Same as main site */
        :root {
            --neon-purple: #9d4edd;
            --neon-cyan: #00f5ff;
            --neon-pink: #ff006e;
            --neon-green: #00ff88;
            --neon-yellow: #ffde00;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --border-glow: rgba(157, 78, 221, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(157, 78, 221, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 245, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 0, 110, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -2;
        }

        /* Grid Pattern */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(157, 78, 221, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(157, 78, 221, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 50px;
            max-width: 600px;
            text-align: center;
            box-shadow: 
                0 0 0 1px var(--border-glow),
                0 20px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out, glowPulse 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            background-size: 300% 100%;
            animation: gradientFlow 3s linear infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 0 1px var(--border-glow), 0 20px 50px rgba(0, 0, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(157, 78, 221, 0.2), 0 20px 50px rgba(0, 0, 0, 0.5); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .warning-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: glitch 0.3s ease-in-out infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, var(--neon-pink), #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .message {
            font-size: 22px;
            color: var(--text-primary);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .emoji {
            font-size: 36px;
            display: inline-block;
            margin: 0 8px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .warning-text {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(157, 78, 221, 0.1));
            border: 2px solid var(--neon-pink);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
        }

        .warning-text::before {
            content: '⚠️';
            position: absolute;
            top: -10px;
            left: -10px;
            font-size: 40px;
            opacity: 0.2;
        }

        .warning-text p {
            margin-bottom: 12px;
        }

        .warning-text strong {
            color: var(--neon-pink);
        }

        .back-button {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-family: 'Cairo', Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .back-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .back-button:hover::before {
            left: 100%;
        }

        .back-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(157, 78, 221, 0.4);
        }

        .back-button:active {
            transform: scale(0.98);
        }

        .code-info {
            background: rgba(157, 78, 221, 0.1);
            border-left: 4px solid var(--neon-purple);
            padding: 20px;
            margin-top: 30px;
            text-align: right;
            border-radius: 8px;
        }

        .code-info p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .credit {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan) !important;
            font-weight: bold;
        }

        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-purple);
            border-radius: 50%;
            animation: float 6s infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-30px); opacity: 0.6; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Gaming decorative elements */
        .corner-decoration {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--neon-purple);
        }

        .corner-decoration.top-left {
            top: 15px;
            left: 15px;
            border-right: none;
            border-bottom: none;
        }

        .corner-decoration.top-right {
            top: 15px;
            right: 15px;
            border-left: none;
            border-bottom: none;
        }

        .corner-decoration.bottom-left {
            bottom: 15px;
            left: 15px;
            border-right: none;
            border-top: none;
        }

        .corner-decoration.bottom-right {
            bottom: 15px;
            right: 15px;
            border-left: none;
            border-top: none;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <!-- Gaming Corners -->
        <div class="corner-decoration top-left"></div>
        <div class="corner-decoration top-right"></div>
        <div class="corner-decoration bottom-left"></div>
        <div class="corner-decoration bottom-right"></div>
        
        <div class="warning-icon">⚠️</div>
        
        <h1>تحذير!</h1>
        
        <div class="message">
            <span class="emoji">🚫</span>
            <strong>لا تحاول تسرق الأكواد يا لاعب!</strong>
            <span class="emoji">🎮</span>
        </div>

        <div class="warning-text">
            <p>🎯 <strong>تم اكتشاف محاولة اختراق!</strong></p>
            <p>هذا الموقع محمي ضد محاولات سرقة الأكواد</p>
            <p>إذا كنت تريد تتعلم البرمجة، يبقي خد كورسات 📚</p>
            <p>كل حركة لك مراقبة... 👁️</p>
        </div>

        <button class="back-button" onclick="goBack()">
            🎮 العودة للصفحة
        </button>

        <div class="code-info">
            <p>💻 تم برمجة هذا الموقع بأحدث التقنيات</p>
            <p class="credit">The Poor Gamer 🎮</p>
            <p>© جميع الحقوق محفوظة - 101 Subscribe</p>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        // Create gaming particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#9d4edd', '#00f5ff', '#ff006e', '#00ff88'];
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particle.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(particle);
            }
        }

        createParticles();

        // Prevent context menu
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        document.addEventListener('selectstart', (e) => {
            e.preventDefault();
        });

        // Auto-redirect after 10s inactivity
        let inactivityTimer;
        function resetTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                window.history.back();
            }, 10000);
        }
        document.addEventListener('mousemove', resetTimer);
        document.addEventListener('keydown', resetTimer);
        resetTimer();

        // Enhanced protection
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C'))) {
                e.preventDefault();
            }
        });

        // Console gaming message
        console.log('%c🎮 THE POOR GAMER - PROTECTED 🎮', 'font-size: 20px; color: #ff006e; font-weight: bold;');
        console.log('%cNice try! But this site is protected!', 'color: #00f5ff;');
    </script>
</body>
</html>
