<!DOCTYPE html>
<html lang="ar">
<head>
    <link rel="icon" href="1.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تابع حساباتي على منصات التواصل الاجتماعي المختلفة">
    <title>The Poor Gamer 🎮 | حساباتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Gaming Particles -->
    <div id="particles"></div>
    
    <div class="wrapper">
        <div class="container">
            <!-- Gaming Corner Decorations -->
            <div class="corner-decor top-left"></div>
            <div class="corner-decor top-right"></div>
            <div class="corner-decor bottom-left"></div>
            <div class="corner-decor bottom-right"></div>
            
            <div class="profile-section">
                <img src="1.jpg" alt="صورتي" class="profile-pic">
                <h1 class="title">The Poor Gamer</h1>
                <p class="subtitle">Follow me on all social media - تابعني على جميع المنصات</p>
                
                <!-- Gaming Level Badge -->
                <div class="gaming-badge">
                    <span class="level">101</span>
                    <span>Subscribe</span>
                </div>
            </div>

            <div class="buttons">
                <a href="https://www.facebook.com/profile.php?id=61573379105207" target="_blank" class="btn facebook" title="Facebook">
                    <i class="fab fa-facebook-f"></i>
                    <span>Facebook</span>
                </a>
                <a href="https://www.instagram.com/bova.rafat/?__pwa=1" target="_blank" class="btn instagram" title="Instagram">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://www.youtube.com/@the_poor_gamer" target="_blank" class="btn youtube" title="YouTube">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube</span>
                </a>
            </div>
            
            <!-- Gaming Stats -->
            <div class="gaming-stats">
                <div class="stat-item">
                    <i class="fas fa-gamepad"></i>
                    <span>Pro Gamer</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-trophy"></i>
                    <span>Subscribe</span>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>تم البرمجة بواسطة <span class="highlight">The Poor Gamer</span> 🎮</p>
        <p class="footer-tagline">Gaming Since 2024</p>
    </footer>

    <script src="protect.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
